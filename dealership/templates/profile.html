{% extends 'base.html' %}

{% block content %}

<section class="max-w-3xl mx-auto px-6 py-16">

    <div class="bg-white/10 border border-white/10 rounded-3xl p-8 shadow-2xl shadow-blue-500/10">

        <h1 class="text-4xl font-black mb-8">
            Update Profile
        </h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label class="block mb-2 text-sm font-semibold text-slate-300">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <p class="text-red-400 text-sm mt-1">
                            {{ field.errors }}
                        </p>
                    {% endif %}
                </div>
            {% endfor %}

            <button class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition hover:scale-[1.02]">
                Update Profile
            </button>
        </form>

    </div>

</section>

{% endblock %}
